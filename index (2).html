<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0f172a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Garage Manager</title>

<!--
╔══════════════════════════════════════════════════════════════════╗
║              GARAGE MANAGER — FIREBASE REAL-TIME SYNC           ║
╠══════════════════════════════════════════════════════════════════╣
║  ARCHITECTURE OVERVIEW                                           ║
║  ─────────────────────────────────────────────────────────────  ║
║  Auth:    Firebase Authentication (Google Sign-In)              ║
║  DB:      Cloud Firestore (real-time NoSQL)                     ║
║  Sync:    onSnapshot() listeners — push updates to all devices  ║
║  Offline: IndexedDB persistence — works without internet        ║
║                                                                  ║
║  DATABASE SCHEMA                                                 ║
║  ─────────────────────────────────────────────────────────────  ║
║  users/{uid}/                                                    ║
║    └─ profile: { garageName, email, displayName, photoURL }     ║
║  vehicles/{uid}/records/{vehicleId}/                            ║
║    └─ { name, mobile, vn, make, model, date, km, sdd,          ║
║         lob, lb, dr, createdAt, updatedAt }                     ║
║                                                                  ║
║  REAL-TIME SYNC FLOW                                             ║
║  ─────────────────────────────────────────────────────────────  ║
║  1. User logs in → Firebase Auth returns uid                    ║
║  2. App subscribes to vehicles/{uid}/records via onSnapshot()   ║
║  3. Any write (add/edit/delete) goes to Firestore               ║
║  4. Firestore pushes change to ALL devices listening            ║
║  5. UI re-renders automatically — no polling, no refresh        ║
║                                                                  ║
║  CONFLICT RESOLUTION                                             ║
║  ─────────────────────────────────────────────────────────────  ║
║  Last-write-wins via Firestore serverTimestamp().               ║
║  Offline changes are queued and applied when reconnected.       ║
║  Firestore handles merge conflicts atomically.                  ║
║                                                                  ║
║  SETUP (one-time, ~3 minutes)                                   ║
║  ─────────────────────────────────────────────────────────────  ║
║  Open the app → click "Setup Firebase" → follow 5 steps        ║
║  Then paste your Firebase config → done!                        ║
╚══════════════════════════════════════════════════════════════════╝
-->

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0f172a;--s1:#1e293b;--s2:#0d1929;
  --acc:#e11d48;--acc2:#4338ca;
  --green:#10b981;--blue:#3b82f6;--gold:#f59e0b;--purple:#a855f7;
  --txt:#f1f5f9;--txt2:#64748b;--bdr:#334155;--r:14px;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overscroll-behavior:none;}
input,select,button,textarea{font-family:inherit;font-size:16px!important;}
input:focus,select:focus{outline:none;border-color:var(--acc)!important;}
select option{background:var(--s1);}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s;}
#splash.hide{opacity:0;pointer-events:none;}
.sp-logo{width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,var(--acc2),var(--acc));display:flex;align-items:center;justify-content:center;box-shadow:0 0 60px rgba(225,29,72,.5);margin-bottom:20px;animation:logoPulse 2s ease infinite;}
@keyframes logoPulse{0%,100%{box-shadow:0 0 40px rgba(225,29,72,.4)}50%{box-shadow:0 0 70px rgba(225,29,72,.7)}}
.sp-title{font-size:28px;font-weight:800;letter-spacing:3px;margin-bottom:6px;}
.sp-sub{color:var(--txt2);font-size:13px;}
.sp-bar{width:200px;height:3px;background:#1e293b;border-radius:99px;margin-top:40px;overflow:hidden;}
.sp-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:99px;animation:fill 1.6s ease forwards;}
@keyframes fill{0%{width:0}100%{width:100%}}

/* ── SETUP WIZARD ── */

.setup-card{width:100%;max-width:500px;background:var(--s1);border:1px solid var(--bdr);border-radius:24px;padding:28px 24px;box-shadow:0 30px 80px rgba(0,0,0,.6);}
.setup-logo{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.setup-logo-icon{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,var(--acc2),var(--acc));display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.setup-brand{font-size:18px;font-weight:800;letter-spacing:1.5px;}
.setup-brand-sub{font-size:11px;color:var(--txt2);}
.setup-title{font-size:22px;font-weight:800;margin-bottom:6px;}
.setup-desc{font-size:13px;color:var(--txt2);line-height:1.6;margin-bottom:22px;}
.step-list{counter-reset:steps;}
.step{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start;counter-increment:steps;}
.step-num{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--acc2),var(--acc));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;margin-top:1px;}
.step-txt{font-size:13px;line-height:1.6;color:var(--txt);}
.step-txt a{color:#818cf8;text-decoration:none;font-weight:700;}
.step-txt a:hover{text-decoration:underline;}
.step-txt code{background:rgba(99,102,241,.15);color:#a5b4fc;padding:1px 6px;border-radius:4px;font-size:12px;font-family:monospace;}
.setup-divider{height:1px;background:var(--bdr);margin:20px 0;}
.config-label{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.config-textarea{width:100%;background:var(--s2);border:1.5px solid var(--bdr);border-radius:12px;color:#a5b4fc;padding:14px;font-family:monospace;font-size:12px;min-height:160px;resize:vertical;line-height:1.6;}
.config-textarea:focus{outline:none;border-color:var(--acc2);}
.config-placeholder{color:var(--txt2);font-style:italic;}
.btn-setup{width:100%;padding:14px;background:linear-gradient(135deg,var(--acc2),#6366f1);border:none;border-radius:12px;color:#fff;font-weight:800;font-size:15px;cursor:pointer;margin-top:14px;box-shadow:0 4px 20px rgba(99,102,241,.4);transition:transform .15s;}
.btn-setup:active{transform:scale(.97);}
.setup-error{background:rgba(225,29,72,.1);border:1px solid rgba(225,29,72,.3);border-radius:10px;padding:10px 14px;font-size:12px;color:#f87171;margin-top:10px;display:none;}
.setup-note{font-size:11px;color:var(--txt2);text-align:center;margin-top:12px;line-height:1.6;}

/* ── AUTH ── */
#auth{display:none;min-height:100vh;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(ellipse at 20% 50%,rgba(67,56,202,.2) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 20%,rgba(225,29,72,.12) 0%,transparent 60%),var(--bg);}
#auth.show{display:flex;}
.auth-box{width:100%;max-width:360px;}
.auth-logo{text-align:center;margin-bottom:24px;}
.auth-logo-icon{width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,var(--acc2),var(--acc));display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(225,29,72,.4);margin:0 auto 12px;}
.auth-title{font-size:22px;font-weight:800;letter-spacing:2px;}
.auth-sub{color:var(--txt2);font-size:12px;margin-top:4px;}
.auth-card{background:var(--s1);border:1px solid var(--bdr);border-radius:20px;padding:24px;box-shadow:0 24px 60px rgba(0,0,0,.5);}
.btn-google{width:100%;padding:13px 16px;background:#fff;border:none;border-radius:12px;color:#1f1f1f;font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;box-shadow:0 2px 12px rgba(0,0,0,.25);}
.btn-google:hover{box-shadow:0 6px 24px rgba(0,0,0,.35);transform:translateY(-1px);}
.btn-google:active{transform:scale(.97);}
.sync-badge{display:flex;align-items:center;gap:6px;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);border-radius:10px;padding:10px 14px;margin-top:14px;font-size:12px;color:#a5b4fc;}
.sync-badge svg{flex-shrink:0;color:#818cf8;}

/* ── LOADING OVERLAY ── */
#loading-overlay{position:fixed;inset:0;background:rgba(15,23,42,.85);backdrop-filter:blur(6px);z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#loading-overlay.show{display:flex;}
.loading-spinner{width:48px;height:48px;border:3px solid rgba(99,102,241,.2);border-top-color:#818cf8;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;font-weight:600;color:var(--txt2);}

/* ── SYNC STATUS BAR ── */
.sync-bar{display:flex;align-items:center;gap:6px;margin-top:3px;}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:all .3s;}
.sync-dot.synced{background:#10b981;}
.sync-dot.syncing{background:#3b82f6;animation:syncPulse .8s ease infinite;}
.sync-dot.offline{background:#f59e0b;}
.sync-dot.error{background:#e11d48;}
@keyframes syncPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.sync-txt{font-size:10px;color:var(--txt2);font-weight:600;}

/* ── MAIN ── */
#main{display:none;min-height:100vh;flex-direction:column;padding-bottom:60px;}
#main.show{display:flex;}
.hdr{background:var(--s1);border-bottom:1px solid var(--bdr);padding:12px 14px;position:sticky;top:0;z-index:100;}
.hdr-row{display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--acc2),var(--acc));display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.brand-name{font-size:15px;font-weight:800;letter-spacing:1px;}
.hdr-btns{display:flex;gap:8px;align-items:center;}
.btn-excel{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:10px;background:rgba(16,185,129,.15);border:1.5px solid var(--green);color:#34d399;font-size:12px;font-weight:700;cursor:pointer;transition:transform .15s;}
.btn-excel:active{transform:scale(.95);}
.btn-import{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:10px;background:rgba(99,102,241,.15);border:1.5px solid rgba(99,102,241,.5);color:#818cf8;font-size:12px;font-weight:700;cursor:pointer;transition:transform .15s;}
.btn-import:active{transform:scale(.95);}
.hdr-avatar{width:34px;height:34px;border-radius:50%;border:2px solid rgba(99,102,241,.5);cursor:pointer;object-fit:cover;transition:transform .15s;}
.hdr-avatar:active{transform:scale(.92);}
.hdr-avatar-init{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--acc2),var(--acc));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;cursor:pointer;transition:transform .15s;}
.hdr-avatar-init:active{transform:scale(.92);}
.search-row{display:flex;gap:8px;margin-top:10px;}
.search-wrap{flex:1;position:relative;}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt2);pointer-events:none;}
.s-inp{width:100%;padding:9px 10px 9px 32px;background:var(--bg);border:1.5px solid var(--bdr);border-radius:10px;color:var(--txt);font-size:14px!important;}
.f-sel{background:var(--bg);border:1.5px solid var(--bdr);border-radius:10px;color:var(--txt);padding:9px 10px;min-width:110px;font-size:13px!important;}

/* ── OFFLINE BANNER ── */
.offline-banner{display:none;background:rgba(245,158,11,.12);border-bottom:1px solid rgba(245,158,11,.3);padding:8px 14px;font-size:12px;color:#fbbf24;font-weight:600;align-items:center;gap:8px;}
.offline-banner.show{display:flex;}

/* ── CARDS ── */
#list{padding:10px 12px;flex:1;}
.empty{text-align:center;padding:60px 20px;color:var(--txt2);}
.empty-ico{opacity:.15;margin-bottom:16px;}
.empty-t{font-size:18px;font-weight:700;color:#94a3b8;margin-bottom:6px;}
.card{background:var(--s1);border:1.5px solid var(--bdr);border-radius:var(--r);padding:14px;margin-bottom:10px;cursor:pointer;transition:transform .15s,border-color .2s;}
.card:active{transform:scale(.985);}
.card.c-ov{border-left:4px solid var(--acc);}
.card.c-sn{border-left:4px solid var(--gold);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.c-name{font-weight:700;font-size:15px;margin-bottom:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.c-ph{font-size:12px;color:var(--txt2);}
.c-vn{font-size:12px;font-weight:700;color:#f43f5e;letter-spacing:1.5px;margin-top:2px;}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;}
.b-ov{background:rgba(225,29,72,.2);color:#f87171;}
.b-sn{background:rgba(245,158,11,.2);color:#fbbf24;}
.b-ok{background:rgba(16,185,129,.15);color:#34d399;}
.c-make{display:inline-block;font-size:11px;font-weight:700;background:rgba(67,56,202,.2);color:#818cf8;padding:3px 10px;border-radius:6px;margin-bottom:8px;}
.card-btns{display:flex;gap:6px;}
.cb{flex:1;padding:8px 4px;border-radius:8px;border:none;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:transform .15s;}
.cb:active{transform:scale(.93);}
.cb-call{background:rgba(59,130,246,.15);color:#60a5fa;}
.cb-rem{background:rgba(16,185,129,.12);color:#34d399;}
.cb-svc{background:rgba(168,85,247,.15);color:#a78bfa;}
.del-btn{width:30px;height:30px;border-radius:8px;background:rgba(225,29,72,.1);border:none;color:#f87171;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s;}
.del-btn:active{transform:scale(.9);}
.edit-btn{width:30px;height:30px;border-radius:8px;background:rgba(59,130,246,.12);border:none;color:#60a5fa;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s;margin-right:4px;}
.edit-btn:active{transform:scale(.9);}
.card-top-actions{display:flex;align-items:center;gap:4px;}

/* ── OVERLAY / SHEET ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;}
.sheet{width:100%;background:var(--s1);border-radius:24px 24px 0 0;padding:20px 16px 40px;max-height:93vh;overflow-y:auto;animation:slideUp .28s cubic-bezier(.34,1.4,.64,1);}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.sh-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.sh-title{font-size:22px;font-weight:800;}
.close-btn{width:32px;height:32px;border-radius:8px;background:var(--bg);border:1px solid var(--bdr);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.field{margin-bottom:13px;}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--txt2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;}
.inp{width:100%;padding:12px 14px;background:var(--bg);border:1.5px solid var(--bdr);border-radius:10px;color:var(--txt);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-main{width:100%;padding:13px;background:linear-gradient(135deg,var(--acc),#be123c);border:none;border-radius:10px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;margin-top:4px;box-shadow:0 4px 20px rgba(225,29,72,.35);transition:transform .15s;}
.btn-main:active{transform:scale(.97);}
.info-box{background:var(--bg);border:1px solid var(--bdr);border-radius:14px;padding:14px;margin-bottom:14px;}
.ib-head{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.avatar{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,var(--acc2),var(--acc));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0;}
.ib-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;border-top:1px solid rgba(51,65,85,.5);padding-top:10px;}
.ib-item .ik{font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;}
.ib-item .iv{font-size:13px;font-weight:600;margin-top:2px;}
.due-box{padding:11px 14px;border-radius:12px;margin-bottom:14px;font-size:13px;font-weight:600;}
.due-ov{background:rgba(225,29,72,.1);border:1px solid rgba(225,29,72,.3);color:#f87171;}
.due-sn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#fbbf24;}
.due-ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#34d399;}
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.act-btn{padding:12px;border-radius:12px;border:none;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:transform .15s;}
.act-btn:active{transform:scale(.95);}
.a-call{background:rgba(59,130,246,.15);color:#60a5fa;}
.a-chat{background:rgba(16,185,129,.12);color:#34d399;}
.a-rem{background:rgba(245,158,11,.12);color:#fbbf24;}
.a-svc{background:rgba(225,29,72,.15);color:#f87171;}
.upd-sec{border-top:1px solid var(--bdr);padding-top:14px;}
.upd-lbl{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.svc-veh{background:rgba(225,29,72,.08);border:1px solid rgba(225,29,72,.2);border-radius:12px;padding:12px 14px;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.svc-ico{width:40px;height:40px;border-radius:10px;background:rgba(225,29,72,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.btn-wa{width:100%;padding:14px;background:linear-gradient(135deg,#25d366,#128c7e);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;transition:transform .15s;}
.btn-wa:active{transform:scale(.97);}
.btn-save{width:100%;padding:13px;background:linear-gradient(135deg,var(--acc2),#0ea5e9);border:none;border-radius:10px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;margin-top:6px;transition:transform .15s;}
.btn-save:active{transform:scale(.97);}

/* Profile sheet */
.profile-pic{width:64px;height:64px;border-radius:50%;border:2px solid rgba(99,102,241,.4);display:block;margin:0 auto 10px;object-fit:cover;}
.profile-init{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--acc2),var(--acc));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;margin:0 auto 10px;}
.profile-name{text-align:center;font-size:18px;font-weight:800;margin-bottom:4px;}
.profile-email{text-align:center;font-size:12px;color:var(--txt2);margin-bottom:14px;}
.profile-stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.profile-stat{background:var(--bg);border:1px solid var(--bdr);border-radius:12px;padding:10px;text-align:center;}
.ps-num{font-size:20px;font-weight:800;}
.ps-lbl{font-size:9px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.btn-logout{width:100%;padding:13px;background:rgba(225,29,72,.1);border:1.5px solid rgba(225,29,72,.3);border-radius:10px;color:#f87171;font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s;}
.btn-logout:active{transform:scale(.97);}

/* import */
.import-drop{border:2px dashed var(--bdr);border-radius:14px;padding:30px 20px;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:14px;}
.import-drop:hover,.import-drop.drag{border-color:var(--acc2);}
.import-preview{background:var(--bg);border:1px solid var(--bdr);border-radius:12px;padding:12px;margin-bottom:14px;max-height:160px;overflow-y:auto;}
.import-row{display:flex;gap:8px;font-size:12px;padding:5px 0;border-bottom:1px solid rgba(51,65,85,.5);}
.import-row:last-child{border-bottom:none;}
.import-col{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.import-col.hd{font-weight:700;color:var(--txt2);font-size:10px;text-transform:uppercase;}
.btn-import-do{width:100%;padding:13px;background:linear-gradient(135deg,#4338ca,#6366f1);border:none;border-radius:10px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;margin-top:6px;transition:transform .15s;}
.btn-import-do:active{transform:scale(.97);}

/* ── TOAST ── */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--s1);border:1px solid var(--bdr);color:var(--txt);padding:10px 22px;border-radius:99px;font-size:13px;font-weight:600;z-index:9999;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.4);transition:opacity .3s,transform .3s;}
.toast.off{opacity:0;transform:translateX(-50%) translateY(10px);pointer-events:none;}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--bdr);display:flex;z-index:60;padding-bottom:env(safe-area-inset-bottom);}
.bnav-btn{flex:1;padding:10px 4px 8px;border:none;background:transparent;color:var(--txt2);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:700;transition:color .15s;}
.bnav-btn.on{color:var(--acc);}
.bnav-add{color:#fff!important;position:relative;top:-10px;}
.bnav-add-ico{width:50px;height:50px;border-radius:16px;background:linear-gradient(135deg,var(--acc),#be123c);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(225,29,72,.5);margin-bottom:2px;transition:transform .15s;}
.bnav-add:active .bnav-add-ico{transform:scale(.93);}
.page{display:none;flex:1;}
.page.show{display:block;}

/* ── SERVICE DUE ── */
.due-dash{padding:12px 12px 20px;}

.today-banner::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.25),transparent 70%);}
.today-banner::after{content:'';position:absolute;bottom:-20px;left:-20px;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,rgba(225,29,72,.15),transparent 70%);}
.tb-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.tb-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#a5b4fc;margin-bottom:4px;}
.tb-date{font-size:22px;font-weight:800;color:#fff;line-height:1.1;}
.tb-day{font-size:12px;color:#a5b4fc;margin-top:2px;}
.tb-time{font-size:11px;font-weight:700;color:#818cf8;background:rgba(99,102,241,.2);border:1px solid rgba(99,102,241,.3);padding:4px 10px;border-radius:20px;}
.tb-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.tb-stat{border-radius:12px;padding:10px 12px;border:1px solid;}
.tbs-ov{background:rgba(225,29,72,.12);border-color:rgba(225,29,72,.3);}
.tbs-td{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);}
.tbs-wk{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.3);}
.tbs-ok{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.3);}
.tbs-num{font-size:22px;font-weight:800;line-height:1;}
.tbs-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.75;margin-top:2px;}
.n-ov{color:#f87171;}.n-td{color:#fbbf24;}.n-wk{color:#60a5fa;}.n-ok{color:#34d399;}
.due-filter-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.due-filter-row::-webkit-scrollbar{display:none;}
.df-btn{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid var(--bdr);background:transparent;color:var(--txt2);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
.df-btn.on-ov{border-color:var(--acc);background:rgba(225,29,72,.12);color:#f87171;}
.df-btn.on-td{border-color:var(--gold);background:rgba(245,158,11,.12);color:#fbbf24;}
.df-btn.on-wk{border-color:var(--blue);background:rgba(59,130,246,.12);color:#60a5fa;}
.df-btn.on-ok{border-color:var(--green);background:rgba(16,185,129,.12);color:#34d399;}
.due-sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.due-sec-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--txt2);}
.send-all-btn{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:6px 12px;border-radius:20px;border:none;cursor:pointer;transition:transform .15s;}
.send-all-btn:active{transform:scale(.95);}
.sa-ov{background:rgba(225,29,72,.15);color:#f87171;border:1px solid rgba(225,29,72,.3);}
.sa-td{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3);}
.sa-wk{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.3);}
.due-card{background:var(--s1);border:1.5px solid var(--bdr);border-radius:14px;padding:13px 14px;margin-bottom:10px;}
.due-card.dc-ov{border-left:4px solid var(--acc);}
.due-card.dc-td{border-left:4px solid var(--gold);}
.due-card.dc-wk{border-left:4px solid var(--blue);}
.dc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.dc-left{display:flex;align-items:center;gap:10px;min-width:0;}
.due-avatar{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0;}
.da-ov{background:rgba(225,29,72,.15);color:#f87171;}
.da-td{background:rgba(245,158,11,.15);color:#fbbf24;}
.da-wk{background:rgba(59,130,246,.15);color:#60a5fa;}
.dc-info{min-width:0;}
.due-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.due-mobile{font-size:11px;color:var(--txt2);margin-top:1px;}
.due-vn-badge{display:inline-block;font-size:10px;font-weight:700;color:#f43f5e;letter-spacing:1.2px;background:rgba(244,63,94,.1);padding:2px 7px;border-radius:5px;margin-top:3px;}
.dc-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.due-countdown{font-size:13px;font-weight:800;text-align:right;}
.dw-ov{color:#f87171;}.dw-td{color:#fbbf24;}.dw-wk{color:#60a5fa;}
.dc-vehicle-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
.dc-make-tag{font-size:10px;font-weight:700;background:rgba(67,56,202,.2);color:#818cf8;padding:2px 8px;border-radius:5px;}
.dc-model{font-size:12px;color:var(--txt2);}
.dc-km{font-size:11px;color:var(--txt2);}
.dc-timeline{display:flex;align-items:center;background:var(--bg);border-radius:10px;padding:9px 12px;margin-bottom:10px;}
.dc-tl-item{flex:1;text-align:center;}
.dc-tl-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2);margin-bottom:3px;}
.dc-tl-date{font-size:12px;font-weight:700;color:var(--txt);}
.dc-tl-sep{color:var(--txt2);font-size:14px;opacity:.4;padding:0 4px;}
.dc-tl-due{color:#f87171;}.dc-tl-due.ok{color:#34d399;}.dc-tl-due.warn{color:#fbbf24;}
.dc-actions{display:flex;gap:6px;}
.dc-btn{flex:1;padding:8px 6px;border-radius:9px;border:none;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:transform .15s;}
.dc-btn:active{transform:scale(.93);}
.dcb-call{background:rgba(59,130,246,.12);color:#60a5fa;}
.dcb-wa{background:rgba(37,211,102,.12);color:#25d366;}
.dcb-rem{background:rgba(245,158,11,.12);color:#fbbf24;}
.dcb-svc{background:rgba(168,85,247,.12);color:#a78bfa;}
.due-empty{text-align:center;padding:50px 20px;color:var(--txt2);}
.due-section{margin-bottom:6px;}

/* garage name setup for first Google login */
.overlay-center{align-items:center;justify-content:center;}
.setup-modal{background:var(--s1);border-radius:20px;padding:28px 22px;width:calc(100% - 40px);max-width:360px;margin:auto;animation:popIn .3s cubic-bezier(.34,1.4,.64,1);}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.setup-modal-center{display:flex;flex-direction:column;align-items:center;text-align:center;}
.setup-g-avatar{width:70px;height:70px;border-radius:50%;border:3px solid rgba(66,133,244,.4);margin-bottom:12px;}
.setup-g-name{font-size:18px;font-weight:800;margin-bottom:4px;}
.setup-g-email{font-size:12px;color:var(--txt2);margin-bottom:20px;}

/* ── OIL CHANGE ── */
.b-oil{background:rgba(168,85,247,.2);color:#d8b4fe;}
.due-oil{background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.3);color:#d8b4fe;}
.tbs-oil{background:rgba(168,85,247,.12);border-color:rgba(168,85,247,.3);}
.n-oil{color:#d8b4fe;}
.df-btn.on-oil{border-color:var(--purple);background:rgba(168,85,247,.12);color:#d8b4fe;}
.dc-oil{border-left:4px solid var(--purple);}
.da-oil{background:rgba(168,85,247,.15);color:#d8b4fe;}
.dw-oil{color:#d8b4fe;}
.sa-oil{background:rgba(168,85,247,.15);color:#d8b4fe;border:1px solid rgba(168,85,247,.3);}
.oil-bar-wrap{background:var(--bg);border-radius:6px;height:6px;margin-top:6px;overflow:hidden;}
.oil-bar{height:100%;border-radius:6px;background:linear-gradient(90deg,#a855f7,#d8b4fe);transition:width .4s;}
.oil-bar.warn{background:linear-gradient(90deg,#f59e0b,#fbbf24);}
.oil-bar.over{background:linear-gradient(90deg,#e11d48,#f87171);}
.dr-tag{font-size:10px;font-weight:700;color:#a78bfa;background:rgba(168,85,247,.12);padding:2px 7px;border-radius:5px;display:inline-flex;align-items:center;gap:3px;}

/* ── MULTI-VEHICLE ── */
.mv-pill{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;color:#f43f5e;letter-spacing:1.2px;background:rgba(244,63,94,.12);padding:2px 8px;border-radius:5px;margin:2px 2px 0 0;}
.mv-pill.p-ov{background:rgba(225,29,72,.2);color:#f87171;}
.mv-pill.p-sn{background:rgba(245,158,11,.18);color:#fbbf24;}
.mv-count-tag{font-size:10px;font-weight:800;color:#818cf8;background:rgba(99,102,241,.15);padding:1px 7px;border-radius:5px;margin-left:4px;vertical-align:middle;}
.vb{background:var(--bg);border:1.5px solid var(--bdr);border-radius:12px;padding:13px 13px 8px;margin-bottom:10px;position:relative;}
.vb-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.vb-lbl{font-size:10px;font-weight:800;color:#818cf8;text-transform:uppercase;letter-spacing:.8px;}
.vb-rm{width:26px;height:26px;border-radius:7px;background:rgba(225,29,72,.1);border:1px solid rgba(225,29,72,.25);color:#f87171;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-addveh{width:100%;padding:10px;border-radius:10px;border:2px dashed rgba(99,102,241,.35);background:rgba(99,102,241,.05);color:#818cf8;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin:4px 0 12px;transition:border-color .2s,background .2s;}
.btn-addveh:active{border-color:#6366f1;background:rgba(99,102,241,.12);}
.dv-card{background:var(--bg);border:1.5px solid var(--bdr);border-radius:12px;padding:12px 13px;margin-bottom:10px;}
.dv-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.dv-vn{font-size:14px;font-weight:800;color:#f43f5e;letter-spacing:1.5px;}
.dv-sub{font-size:11px;color:var(--txt2);margin-top:1px;}
.dv-acts{display:flex;gap:6px;margin-top:10px;}
.dv-btn{flex:1;padding:8px 4px;border-radius:8px;border:none;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:transform .15s;}
.dv-btn:active{transform:scale(.93);}
</style>
</head>

/* ═══════════════════════════════════════════════════════════════
   FIREBASE INIT — called immediately on DOMContentLoaded
═══════════════════════════════════════════════════════════════ */
function initFirebase(cfg){
  try{
    // Avoid double-init if already done
    if(!firebase.apps.length){
      firebase.initializeApp(cfg);
    }
    db=firebase.firestore();
    auth=firebase.auth();

    // Enable offline persistence (IndexedDB cache)
    // This lets the app work offline and syncs when back online
    db.enablePersistence({synchronizeTabs:true}).catch(err=>{
      if(err.code==='failed-precondition'){
        // Multiple tabs open — persistence available in one tab only
        console.warn('Persistence unavailable: multiple tabs');
      }else if(err.code==='unimplemented'){
        console.warn('Persistence not supported in this browser');
      }
    });

    // Monitor online/offline status
    window.addEventListener('online', ()=>{ isOnline=true; setSyncStatus('synced','Synced'); hideBanner(); });
    window.addEventListener('offline',()=>{ isOnline=false; setSyncStatus('offline','Offline — changes queued'); showBanner(); });

    // Listen for auth state changes
    // This is the main entry point — fires on login, logout, and page reload
    auth.onAuthStateChanged(handleAuthState);

  }catch(e){
    console.error('Firebase init failed',e);
    alert('❌ Firebase error: '+e.message+'\n\nCheck your config or internet connection.');
  }
}

/* ═══════════════════════════════════════════════════════════════
   AUTH STATE HANDLER
   Firebase calls this on every auth change + on page reload
   This replaces manual session management — Firebase handles it
═══════════════════════════════════════════════════════════════ */
async function handleAuthState(user){
  hideSplash();
  hideLoading();
  if(user){
    // User is signed in (Google or restored from previous session)
    await onUserSignedIn(user);
  }else{
    // No user — show sign-in screen
    teardownListener();
    CU=null; CS=[];
    showAuth();
  }
}

async function onUserSignedIn(user){
  showLoading('Loading your garage…');
  try{
    // Check if user has a garage profile in Firestore
    const profileRef=db.collection('users').doc(user.uid).collection('profile').doc('info');
    const profileSnap=await profileRef.get();

    if(profileSnap.exists){
      const data=profileSnap.data();
      CU={uid:user.uid, email:user.email, garageName:data.garageName,
          displayName:user.displayName, photoURL:user.photoURL};
      hideLoading();
      showMain();
      subscribeToVehicles(); // Start real-time listener
    }else{
      // First login — ask for garage name
      hideLoading();
      showAuth();
      promptGarageName(user);
    }
  }catch(e){
    hideLoading();
    console.error(e);
    toast('❌ Failed to load profile. Check connection.');
    showAuth();
  }
}

/* ═══════════════════════════════════════════════════════════════
   REAL-TIME SYNC — Firestore onSnapshot listener
   ─────────────────────────────────────────────────────────────
   HOW IT WORKS:
   1. We subscribe to the user's vehicles collection in Firestore
   2. Firestore sends the full current data immediately
   3. Any change anywhere (add/edit/delete, any device) triggers
      another call to this callback automatically
   4. We update CS (local array) and re-render the UI
   5. Firestore's offline cache means this works even offline
      and syncs the queued changes when back online
═══════════════════════════════════════════════════════════════ */
function subscribeToVehicles(){
  teardownListener(); // Clean up any previous listener
  setSyncStatus('syncing','Connecting…');

  const col=db.collection('vehicles').doc(CU.uid).collection('records');

  // onSnapshot fires immediately + on every change
  unsubscribe=col.orderBy('createdAt','desc').onSnapshot(
    snapshot=>{
      // Build CS from Firestore docs
      CS=snapshot.docs.map(doc=>({id:doc.id, ...doc.data()}));
      setSyncStatus('synced','Synced');
      renderList();
      if(currentPage==='due') renderDue();
    },
    err=>{
      console.error('Snapshot error',err);
      setSyncStatus('error','Sync error');
      toast('⚠️ Sync issue — working offline');
    }
  );
}

function teardownListener(){
  if(unsubscribe){ unsubscribe(); unsubscribe=null; }
}

/* ═══════════════════════════════════════════════════════════════
   FIRESTORE CRUD HELPERS
   All writes go to Firestore → onSnapshot propagates to all devices
═══════════════════════════════════════════════════════════════ */
function vehiclesCol(){
  return db.collection('vehicles').doc(CU.uid).collection('records');
}

async function fsAdd(data){
  setSyncStatus('syncing','Saving…');
  await vehiclesCol().doc(data.id).set({
    ...data,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
}

async function fsUpdate(id, data){
  setSyncStatus('syncing','Saving…');
  await vehiclesCol().doc(id).update({
    ...data,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
}

async function fsDelete(id){
  setSyncStatus('syncing','Deleting…');
  await vehiclesCol().doc(id).delete();
}

function getDays(ds){ if(!ds)return null; const d=new Date(ds),t=new Date();t.setHours(0,0,0,0);d.setHours(0,0,0,0);return Math.floor((d-t)/86400000); }
function nsd(){ const d=new Date();d.setDate(d.getDate()+90);return d.toISOString().split('T')[0]; }
function fmt(ds){ if(!ds)return'—'; const [y,m,d]=ds.split('-');const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return `${d} ${mn[parseInt(m)-1]} ${y}`; }

/* ═══════════════════════════════════════════════════════════════
   OIL CHANGE HELPERS
   Uses daily running (dr) to estimate next oil change.
   Interval: 2500 km (configurable via OIL_INTERVAL)
═══════════════════════════════════════════════════════════════ */
const OIL_INTERVAL = 2500; // km between oil changes

function calcOilDue(c){
  // Need daily running and a service date to calculate
  const dr = parseFloat(c.dr);
  if(!dr || dr <= 0 || !c.date) return null;

  const serviceDate = new Date(c.date);
  const today = new Date();
  today.setHours(0,0,0,0);
  serviceDate.setHours(0,0,0,0);

  const daysSinceService = Math.floor((today - serviceDate) / 86400000);
  const kmSinceService = Math.round(daysSinceService * dr);
  const kmRemaining = OIL_INTERVAL - kmSinceService;
  const daysRemaining = Math.round(kmRemaining / dr);

  const estDueDate = new Date(today);
  estDueDate.setDate(estDueDate.getDate() + daysRemaining);
  const estDueDateStr = estDueDate.toISOString().split('T')[0];

  // status: 'over' = overdue, 'soon' = within 7 days, 'week' = within 14 days, 'ok' = fine
  let status = 'ok';
  if(daysRemaining < 0) status = 'over';
  else if(daysRemaining <= 7) status = 'soon';
  else if(daysRemaining <= 14) status = 'week';

  const pct = Math.min(100, Math.round((kmSinceService / OIL_INTERVAL) * 100));

  return { daysRemaining, kmSinceService, kmRemaining, estDueDateStr, status, pct, dr };
}

function renderDue(){
  const now=new Date();
  const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const SM=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const overdue=CS.filter(c=>getDays(c.sdd)<0).sort((a,b)=>getDays(a.sdd)-getDays(b.sdd));
  const dueToday=CS.filter(c=>getDays(c.sdd)===0);
  const dueWeek=CS.filter(c=>{const d=getDays(c.sdd);return d>0&&d<=7;}).sort((a,b)=>getDays(a.sdd)-getDays(b.sdd));
  const dueMonth=CS.filter(c=>{const d=getDays(c.sdd);return d>7&&d<=30;}).sort((a,b)=>getDays(a.sdd)-getDays(b.sdd));
  // Oil change lists
  const oilDue=CS.filter(c=>{ const o=calcOilDue(c); return o&&o.status==='over'; });
  const oilSoon=CS.filter(c=>{ const o=calcOilDue(c); return o&&(o.status==='soon'||o.status==='week'); });
  const oilAllDue=[...oilDue,...oilSoon].sort((a,b)=>{
    const oa=calcOilDue(a),ob=calcOilDue(b);

      <div class="tb-stat tbs-ov"><div class="tbs-num n-ov">${overdue.length}</div><div class="tbs-lbl" style="color:#f87171">Overdue</div></div>
      <div class="tb-stat tbs-td"><div class="tbs-num n-td">${dueToday.length}</div><div class="tbs-lbl" style="color:#fbbf24">Due Today</div></div>

  const filterHtml=`<div class="due-filter-row">${filters.map(f=>`<button class="df-btn ${dueFilter===f.key?f.on:''}" onclick="setDueFilter('${f.key}')">${f.label} <span style="font-weight:800;margin-left:3px">${f.cnt}</span></button>`).join('')}</div>`;
  let showList=[],listTitle='',saCls='sa-ov',isOilTab=false;

          <button class="dc-btn dcb-wa" onclick="sendOilRem('${c.id}')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Oil Remind</button>

        </div></div>`;
    }
    const d=getDays(c.sdd);const isOv=d<0,isTd=d===0;
    const cc=isOv?'dc-ov':isTd?'dc-td':'dc-wk';
    const ac=isOv?'da-ov':isTd?'da-td':'da-wk';
    const nc=isOv?'dw-ov':isTd?'dw-td':'dw-wk';
    const ct=isOv?`${Math.abs(d)} days overdue`:isTd?'🔥 Due Today!':d===1?'Due Tomorrow':`Due in ${d} days`;
    const dc=isOv?'dc-tl-due':isTd?'dc-tl-due warn':'dc-tl-due ok';
    return `<div class="due-card ${cc}">

  document.getElementById('due-dash').innerHTML=banner+filterHtml+`<div class="due-section"><div class="due-sec-hdr"><div class="due-sec-title">${listTitle}</div>${sendAll}</div>${cards}</div>`;
}
function setDueFilter(f){dueFilter=f;renderDue();}

function sendAllRem(filter){
  let list=[];
  if(filter==='ov')list=CS.filter(c=>getDays(c.sdd)<0);
  else if(filter==='td')list=CS.filter(c=>getDays(c.sdd)===0);
  else if(filter==='wk')list=CS.filter(c=>{const d=getDays(c.sdd);return d>0&&d<=7;});
  else list=CS.filter(c=>{const d=getDays(c.sdd);return d>7&&d<=30;});
  if(!list.length){toast('No customers to remind');return;}
  let i=0;
  function next(){
    if(i>=list.length)return;
    const c=list[i++];const d=getDays(c.sdd);
    const note=d<0?`⚠️ *OVERDUE* by ${Math.abs(d)} days!`:d===0?`🔔 Due *TODAY*!`:`⏰ Due in *${d} days* on *${fmt(c.sdd)}*.`;
    const msg=`Hello ${c.name}! 🙏\n\nReminder from *${CU.garageName}*\n\n🏍️ *${c.vn}* — ${c.make} ${c.model}${c.km?`\n📊 KM: ${Number(c.km).toLocaleString()}`:''}\n\n📅 Last Service: *${fmt(c.date)}*\n📅 Due Date: *${fmt(c.sdd)}*\n\n${note}\n\nCall us to book! 🙌\n📞 8766570825 / 9404028154`;
    window.open('https://wa.me/91'+c.mobile+'?text='+encodeURIComponent(msg),'_blank');
    if(i<list.length)setTimeout(next,800);
  }
  next();toast(`📲 Sending to ${list.length} customers…`);
}

/* helper: build one vehicle input block (used in add & edit forms) */

  const mkOpts=Object.keys(MAKES).map(m=>`<option${v&&v.make===m?' selected':''}>${m}</option>`).join('');
  const mlOpts=v&&v.make&&MAKES[v.make]?MAKES[v.make].map(m=>`<option${m===v.model?' selected':''}>${m}</option>`).join(''):'<option>Pick make first</option>';
  return `<div class="vb" id="vb-${idx}">
    <div class="vb-hdr"><span class="vb-lbl">🏍 Vehicle ${idx+1}</span>${idx>0?`<button class="vb-rm" onclick="removeVb(${idx})" title="Remove">✕</button>`:''}</div>
    <div class="row2">
      <div class="field"><label class="lbl">Vehicle No *</label><input class="inp vb-vn" data-i="${idx}" type="text" placeholder="MH12AB1234" value="${v&&v.vn?v.vn:''}" oninput="this.value=this.value.toUpperCase()"/></div>
      <div class="field"><label class="lbl">Current KM</label><input class="inp vb-km" data-i="${idx}" type="number" placeholder="e.g. 12000" value="${v&&v.km?v.km:''}"/></div>
    </div>
    <div class="row2">
      <div class="field"><label class="lbl">Make *</label>
        <select class="inp vb-mk" data-i="${idx}" onchange="fillVbMod(${idx})"><option value="">Select</option>${mkOpts}</select></div>
      <div class="field"><label class="lbl">Model *</label>
        <select class="inp vb-ml" data-i="${idx}" ${v&&v.make?'':'disabled'}>${mlOpts}</select></div>
    </div>
    <div class="row2">
      <div class="field"><label class="lbl">Service Date</label><input class="inp vb-dt" data-i="${idx}" type="date" value="${v&&v.date?v.date:today}"/></div>
      <div class="field"><label class="lbl">🛢️ Daily Running (km/day)</label><input class="inp vb-dr" data-i="${idx}" type="number" placeholder="e.g. 30" value="${v&&v.dr?v.dr:''}"/></div>
    </div>
  </div>`;
}

function addVb(){

function removeVb(idx){
  const el=document.getElementById('vb-'+idx);
  if(el) el.remove();

function fillVbMod(idx){
  const mk=document.querySelector('.vb-mk[data-i="'+idx+'"]').value;
  const sl=document.querySelector('.vb-ml[data-i="'+idx+'"]');
  sl.disabled=!mk;
  sl.innerHTML=mk?MAKES[mk].map(m=>`<option>${m}</option>`).join(''):'<option>Pick make first</option>';
}

function fillMod(){
  /* legacy — kept for safety */ const mk=document.getElementById('a-mk')?.value;const sl=document.getElementById('a-ml');if(!mk||!sl)return;sl.disabled=!mk;sl.innerHTML=mk?MAKES[mk].map(m=>`<option>${m}</option>`).join(''):'<option>Pick make first</option>';
}

async function submitAdd(){
  const nm=document.getElementById('a-nm').value.trim();
  const mo=document.getElementById('a-mo').value.trim();
  if(!nm){toast('⚠️ Enter customer name');return;}
  if(!/^[0-9]{10}$/.test(mo)){toast('⚠️ Enter valid 10-digit mobile');return;}
  const blocks=[...document.querySelectorAll('.vb')];
  if(!blocks.length){toast('⚠️ Add at least one vehicle');return;}
  const today=new Date().toISOString().split('T')[0];
  const vehicles=[];
  for(const bl of blocks){
    const i=bl.id.replace('vb-','');
    const vn=bl.querySelector('.vb-vn').value.trim().toUpperCase();
    const km=bl.querySelector('.vb-km').value;
    const mk=bl.querySelector('.vb-mk').value;
    const ml=bl.querySelector('.vb-ml').value;
    const dt=bl.querySelector('.vb-dt').value||today;
    const dr=bl.querySelector('.vb-dr').value;
    if(!vn||!mk||!ml){toast('⚠️ Fill vehicle no, make and model for all vehicles');return;}
    const due=new Date(dt);due.setDate(due.getDate()+90);
    vehicles.push({vid:Date.now().toString()+Math.random().toString(36).slice(2),vn,km,make:mk,model:ml,date:dt,dr:dr||'',sdd:due.toISOString().split('T')[0],lob:'',lb:''});
  }
  // Also write flat fields from first vehicle for backward compat with existing renderList/detail
  const v0=vehicles[0];
  const rec={id:Date.now().toString(),name:nm,mobile:mo,
    vn:v0.vn,make:v0.make,model:v0.model,date:v0.date,km:v0.km,dr:v0.dr,sdd:v0.sdd,
    vehicles};
  try{
    closeM();
    await fsAdd(rec);
    toast(`✅ ${nm} added with ${vehicles.length} vehicle${vehicles.length>1?'s':''}!`);
  }catch(e){ toast('❌ Failed: '+e.message); }
}

async function delC(id,name){
  if(!confirm('Delete '+name+'?'))return;
  try{ await fsDelete(id); toast('🗑️ Deleted'); }
  catch(e){ toast('❌ Failed: '+e.message); }
}

function openDetail(id){
  const c=CS.find(x=>x.id===id);if(!c)return;
  // Normalise: multi-vehicle records have c.vehicles[], flat records don't
  const vehs=c.vehicles&&c.vehicles.length?c.vehicles:[{vid:'v0',vn:c.vn,make:c.make,model:c.model,date:c.date,km:c.km,dr:c.dr,sdd:c.sdd,lob:c.lob,lb:c.lb}];

  // Per-vehicle sections
  const vehSections=vehs.map(v=>{
    const d=getDays(v.sdd);
    let dBox='';
    if(d!==null){
      if(d<0)dBox=`<div class="due-box due-ov" style="margin-bottom:8px">🔴 <strong>${v.vn}</strong> overdue by ${Math.abs(d)} days!</div>`;
      else if(d===0)dBox=`<div class="due-box due-sn" style="margin-bottom:8px">⚠️ <strong>${v.vn}</strong> due TODAY!</div>`;
      else if(d<=7)dBox=`<div class="due-box due-sn" style="margin-bottom:8px">⏰ <strong>${v.vn}</strong> in ${d} days</div>`;
    }
    // Oil change for this vehicle
    const oilInfo=calcOilDue(v);
    let oilHtml='';
    if(oilInfo&&oilInfo.status!=='ok'){
      const barCls=oilInfo.status==='over'?'over':oilInfo.status==='soon'?'warn':'';
      const oilMsg=oilInfo.status==='over'
        ?`🛢️ <strong>${v.vn}</strong> oil overdue ~${Math.abs(oilInfo.daysRemaining)} days`
        :`🛢️ <strong>${v.vn}</strong> oil due ~${oilInfo.daysRemaining} days (${fmt(oilInfo.estDueDateStr)})`;
      const boxCls=oilInfo.status==='over'?'due-ov':'due-sn';
      oilHtml=`<div class="due-box ${boxCls}" style="margin-top:6px;margin-bottom:6px;font-size:12px">
        ${oilMsg}

function sendOilRem(id){
  const c=CS.find(x=>x.id===id);if(!c)return;
  // For multi-vehicle records, send oil reminder for all vehicles with oil due
  const vehs=c.vehicles&&c.vehicles.length?c.vehicles:[{vid:'v0',vn:c.vn,make:c.make,model:c.model,date:c.date,km:c.km,dr:c.dr,sdd:c.sdd}];
  const lines=vehs.map(v=>{
    const oil=calcOilDue(v);if(!oil||oil.status==='ok')return'';
    const isOv=oil.status==='over';
    return `🏍️ *${v.vn}* — ${v.make} ${v.model}\n🏃 ${oil.dr} km/day · Est. ${oil.kmSinceService.toLocaleString()} km since service\n${isOv?`⚠️ *OVERDUE* ~${Math.abs(oil.daysRemaining)} days`:`⏰ Due ~${oil.daysRemaining} days (${fmt(oil.estDueDateStr)})` }`;
  }).filter(Boolean);
  if(!lines.length)return;
  const msg=`Hello ${c.name}! 🙏\n\n🛢️ *Oil Change Reminder* from *${CU.garageName}*\n\n${lines.join('\n\n')}\n\n⚙️ Interval: *${OIL_INTERVAL.toLocaleString()} km*\n\nPlease visit us soon! 🙌\n📞 8766570825 / 9404028154`;
  window.open('https://wa.me/91'+c.mobile+'?text='+encodeURIComponent(msg),'_blank');
}

function sendAllOilRem(){
  const list=CS.filter(c=>{ const o=calcOilDue(c); return o&&(o.status==='over'||o.status==='soon'||o.status==='week'); });
  if(!list.length){toast('No oil change reminders to send');return;}
  let i=0;
  function next(){
    if(i>=list.length)return;
    sendOilRem(list[i++].id);
    if(i<list.length)setTimeout(next,800);
  }
  next();toast(`📲 Sending oil reminders to ${list.length} customers…`);
}

function sendRem(cid, vid){
  const c=CS.find(x=>x.id===cid);if(!c)return;
  const vehs=c.vehicles&&c.vehicles.length?c.vehicles:[{vid:'v0',vn:c.vn,make:c.make,model:c.model,date:c.date,km:c.km,sdd:c.sdd}];
  // If vid specified, remind only for that vehicle; else remind all due vehicles
  const targets=vid?vehs.filter(v=>v.vid===vid):vehs;
  const lines=targets.map(v=>{
    const d=getDays(v.sdd);if(d===null)return'';
    const note=d<0?`⚠️ *OVERDUE* ${Math.abs(d)} days`:d===0?`🔔 Due *TODAY*`:d<=7?`⏰ Due in *${d} days*`:d!==null?`📅 Next *${fmt(v.sdd)}*`:'';
    return `🏍️ *${v.vn}* — ${v.make} ${v.model}${v.km?` · ${Number(v.km).toLocaleString()} km`:''}\n📅 Last: ${fmt(v.date)} · Due: *${fmt(v.sdd)}*\n${note}`;
  }).filter(Boolean);
  if(!lines.length){toast('No due reminders');return;}
  const msg=`Hello ${c.name}! 🙏\n\nReminder from *${CU.garageName}*\n\n${lines.join('\n\n')}\n\nCall us to book! ${lines.length>1?'':'🙌'}\n📞 8766570825 / 9404028154`;
  window.open('https://wa.me/91'+c.mobile+'?text='+encodeURIComponent(msg),'_blank');
}

async function submitEdit(id, origVids){
  const nm=document.getElementById('e-nm').value.trim();
  const mo=document.getElementById('e-mo').value.trim();
  if(!nm){toast('⚠️ Enter customer name');return;}
  if(!/^[0-9]{10}$/.test(mo)){toast('⚠️ Enter valid 10-digit mobile');return;}
  const origVidArr=(origVids||'').split(',').filter(Boolean);
  const c=CS.find(x=>x.id===id);if(!c)return;
  const origVehs=c.vehicles&&c.vehicles.length?c.vehicles:[{vid:'v0',vn:c.vn,make:c.make,model:c.model,date:c.date,km:c.km,dr:c.dr,sdd:c.sdd,lob:c.lob,lb:c.lb}];
  const blocks=[...document.querySelectorAll('.vb')];
  if(!blocks.length){toast('⚠️ Add at least one vehicle');return;}
  const today=new Date().toISOString().split('T')[0];
  const vehicles=[];
  blocks.forEach((bl,bi)=>{
    const domIdx=parseInt(bl.id.replace('vb-',''));
    const vn=bl.querySelector('.vb-vn').value.trim().toUpperCase();
    const km=bl.querySelector('.vb-km').value;
    const mk=bl.querySelector('.vb-mk').value;
    const ml=bl.querySelector('.vb-ml').value;
    const dt=bl.querySelector('.vb-dt').value||today;
    const dr=bl.querySelector('.vb-dr').value;
    if(!vn||!mk||!ml){toast('⚠️ Fill vehicle no, make, model for all vehicles');return;}
    const existVid=origVidArr[domIdx]||null;
    const orig=origVehs.find(v=>v.vid===existVid)||{};
    vehicles.push({vid:existVid||Date.now().toString()+Math.random().toString(36).slice(2),
      vn,km,make:mk,model:ml,date:dt,dr:dr||'',sdd:orig.sdd||(() =>{const d=new Date(dt);d.setDate(d.getDate()+90);return d.toISOString().split('T')[0];})(),
      lob:orig.lob||'',lb:orig.lb||''});
  });
  if(!vehicles.length)return;
  const v0=vehicles[0];
  try{ await fsUpdate(id,{name:nm,mobile:mo,vehicles,vn:v0.vn,make:v0.make,model:v0.model,date:v0.date,km:v0.km,dr:v0.dr||'',sdd:v0.sdd}); closeM(); toast('✅ Updated & synced!'); }
  catch(e){ toast('❌ Failed: '+e.message); }
}

  const data=CS.map((c,i)=>({'Sr':i+1,'Name':c.name,'Mobile':c.mobile,'Vehicle No':c.vn,'Make':c.make,'Model':c.model,'Date':c.date,'KM':c.km||'','Daily Running (km/day)':c.dr||'','Next Service':c.sdd,'Last Oil':c.lob||'','Bill ₹':c.lb||''}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(data),'Customers');
  XLSX.writeFile(wb,'Garage_'+CU.garageName.replace(/\s+/g,'_')+'_'+new Date().toISOString().split('T')[0]+'.xlsx');
  toast('✅ Excel downloaded!');
}

        <button class="close-btn" onclick="closeM()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
      <div class="import-drop" id="imp-drop" onclick="document.getElementById('imp-file').click()"
        ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')"
        ondrop="event.preventDefault();this.classList.remove('drag');handleImportFile(event.dataTransfer.files[0])">
        <div style="color:var(--txt2);margin-bottom:10px"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="12" y2="18"/><line x1="15" y1="15" x2="12" y2="18"/></svg></div>
        <div style="font-weight:700;font-size:15px;margin-bottom:4px">Tap to choose file</div>
        <div style="font-size:12px;color:var(--txt2)">Supports .xlsx, .xls, .csv</div>
        <input type="file" id="imp-file" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleImportFile(this.files[0])"/>
      </div>
      <div style="background:rgba(67,56,202,.08);border:1px solid rgba(67,56,202,.25);border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:11px;color:#a5b4fc;line-height:1.6;">
        <strong>📋 Expected columns:</strong><br/>Name · Mobile · Vehicle No · Make · Model · Service Date · KM · Next Service
      </div>
      <div id="imp-preview" style="display:none">
        <div style="font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;margin-bottom:8px" id="imp-count"></div>
        <div class="import-preview" id="imp-table"></div>
        <button class="btn-import-do" onclick="doImport()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:6px"><polyline points="20 6 9 17 4 12"/></svg>Import All Records</button>
      </div>
    </div>
  </div>`;
}

function handleImportFile(file){
  if(!file||!window.XLSX){toast('⚠️ Excel library not ready');return;}
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const raw=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      if(!raw.length){toast('⚠️ No data found');return;}
      const norm=s=>String(s).toLowerCase().replace(/[\s_\-\.#]/g,'');
      const keyMap={name:['name','customername','customer'],mobile:['mobile','phone','contact','mobileno'],vn:['vehicleno','vehiclenumber','vno','regno'],make:['make','brand','company'],model:['model','vehiclemodel'],date:['servicedate','date','lastservice'],km:['km','odometer','currentkm'],dr:['dailyrunning','dr','kmperday','dailykm','running'],sdd:['nextservice','nextservicedate','duedate']};
      const headers=Object.keys(raw[0]).reduce((acc,h)=>{const n=norm(h);for(const[k,al]of Object.entries(keyMap)){if(al.includes(n)){acc[k]=h;break;}}return acc;},{});
      importRows=raw.map(row=>{
        const today=new Date().toISOString().split('T')[0];
        const dt=row[headers.date]||today;
        let sdd=row[headers.sdd]||'';
        if(!sdd){const d=new Date(dt);d.setDate(d.getDate()+90);sdd=d.toISOString().split('T')[0];}
        return {id:Date.now().toString()+Math.random().toString(36).slice(2),name:String(row[headers.name]||'').trim(),mobile:String(row[headers.mobile]||'').trim().replace(/\D/g,'').slice(-10),vn:String(row[headers.vn]||'').trim().toUpperCase(),make:String(row[headers.make]||'').trim(),model:String(row[headers.model]||'').trim(),date:dt,km:String(row[headers.km]||'').trim(),dr:String(row[headers.dr]||'').trim(),sdd};
      }).filter(r=>r.name&&r.mobile);
      if(!importRows.length){toast('⚠️ No valid rows. Check Name & Mobile columns.');return;}
      document.getElementById('imp-count').textContent=`${importRows.length} record${importRows.length!==1?'s':''} ready`;
      document.getElementById('imp-table').innerHTML=`<div class="import-row"><div class="import-col hd">Name</div><div class="import-col hd">Mobile</div><div class="import-col hd">Vehicle</div><div class="import-col hd">Make</div></div>`+importRows.slice(0,20).map(r=>`<div class="import-row"><div class="import-col">${r.name}</div><div class="import-col">${r.mobile}</div><div class="import-col">${r.vn||'—'}</div><div class="import-col">${r.make}</div></div>`).join('')+(importRows.length>20?`<div style="text-align:center;font-size:11px;color:var(--txt2);padding:6px">...and ${importRows.length-20} more</div>`:'');
      document.getElementById('imp-preview').style.display='';
      document.getElementById('imp-drop').style.borderColor='var(--green)';
    }catch(err){toast('❌ Could not read: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
}

async function doImport(){
  if(!importRows.length){toast('⚠️ No rows to import');return;}
  const existing=new Set(CS.map(x=>x.vn+x.mobile));
  const newRows=importRows.filter(r=>!existing.has(r.vn+r.mobile));
  const dupes=importRows.length-newRows.length;
  if(!newRows.length){toast('⚠️ All records already exist');return;}
  showLoading(`Importing ${newRows.length} records…`);
  try{
    // Use Firestore batch for atomic multi-write (max 500 per batch)
    const BATCH_SIZE=450;
    for(let i=0;i<newRows.length;i+=BATCH_SIZE){
      const batch=db.batch();
      const chunk=newRows.slice(i,i+BATCH_SIZE);
      chunk.forEach(r=>{
        const ref=vehiclesCol().doc(r.id);
        batch.set(ref,{...r,createdAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
      });
      await batch.commit();
    }
    hideLoading();closeM();
    toast(`✅ Imported ${newRows.length} records${dupes?` (${dupes} duplicates skipped)`:''}`);
  }catch(e){ hideLoading(); toast('❌ Import failed: '+e.message); }
}
</script>
